<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Retro Office</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="desktop">

  <div class="icon" ondblclick="openApp('slides')">
    <img src="slides.svg">
    <span>Retro Slides</span>
  </div>

  <div class="icon" ondblclick="openApp('sheets')">
    <img src="spreadsheet.svg">
    <span>Retro Sheets</span>
  </div>

  <div class="icon" ondblclick="openApp('design')">
    <img src="design.svg">
    <span>Retro Design</span>
  </div>

  <div class="icon" ondblclick="openApp('write')">
    <img src="write.svg">
    <span>Retro Write</span>
  </div>

</div>

<div class="taskbar">
  <span>🟦 Retro Office</span>
</div>

<script src="script.js"></script>
</body>
</html>
