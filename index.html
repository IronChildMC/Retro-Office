<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Retro Office</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #02193b;
      color: white;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .logo img {
      width: 60px;
      height: 60px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      padding: 40px;
      background: #252526;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: #2d2d30;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-6px);
      border: 1px solid #3aa0ff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .card img {
      width: 70px;
      height: 70px;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
    }

    .card-sub {
      font-size: 13px;
      color: #aaa;
      margin-top: 5px;
    }

  </style>
   <link rel="icon" type="image/x-icon" href="logo.ico">
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <img src="logo.png">
    <h1>Retro Office</h1>
  </div>

  <div class="container">
    <div class="grid">

      <a class="card" href="https://minimal-slides-1.preview.emergentagent.com" target="_blank">
        <img src="slides.svg">
        <div class="card-title">Slides</div>
        <div class="card-sub">Presentaciones</div>
      </a>

      <a class="card" href="https://vector-spreadsheet.preview.emergentagent.com" target="_blank">
        <img src="spreadsheet.svg">
        <div class="card-title">Sheets</div>
        <div class="card-sub">Hojas de cálculo</div>
      </a>

      <a class="card" href="https://design-studio-1025.preview.emergentagent.com" target="_blank">
        <img src="design.svg">
        <div class="card-title">Design</div>
        <div class="card-sub">Diseño gráfico</div>
      </a>

      <a class="card" href="https://write-studio-3.preview.emergentagent.com" target="_blank">
        <img src="write.svg">
        <div class="card-title">Write</div>
        <div class="card-sub">Documentos</div>
      </a>

    </div>
  </div>

</div>

</body>
</html>
